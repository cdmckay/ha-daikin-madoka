name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # `brands` requires the domain to be registered in home-assistant/brands,
          # which only matters for HACS-default listing. Ignore it until/unless we
          # submit there.
          ignore: brands

  tests:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync
      - run: uv run ruff format --check custom_components tests
      - run: uv run ruff check custom_components tests
      - run: uv run pytest -q
