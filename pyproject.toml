[tool.ruff]
target-version = "py313"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
# `ruff format` owns code line length; the remaining long lines are protocol
# log strings and docstrings where wrapping hurts readability.
ignore = ["E501"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
